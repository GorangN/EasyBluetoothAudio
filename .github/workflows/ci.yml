name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer requires full tag history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore --nologo -v q

      - name: Build
        run: dotnet build --no-restore -c Release --nologo -v q

      - name: Test
        run: dotnet test --no-build -c Release --nologo -v q
